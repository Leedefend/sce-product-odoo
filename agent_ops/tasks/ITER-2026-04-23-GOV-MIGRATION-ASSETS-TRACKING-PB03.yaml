task_id: ITER-2026-04-23-GOV-MIGRATION-ASSETS-TRACKING-PB03
title: Track migration rebuild assets required by server business-data reconstruction
type: governance-optimization
status: review
priority: high
mode: implement

goal: >
  Ensure the already prepared migration rebuild assets under
  `artifacts/migration/**` enter the repository so a fresh server checkout can
  reproduce legacy business-data reconstruction.

user_visible_outcome:
  - "`artifacts/migration/**` is no longer excluded from version control."
  - "Other disposable `artifacts/` outputs remain ignored."
  - "Migration rebuild evidence, payloads, rollback targets, and replay manifests can be committed into main."

scope:
  allowed_paths:
    - .gitattributes
    - .gitignore
    - artifacts/migration/**
    - agent_ops/tasks/ITER-2026-04-23-GOV-MIGRATION-ASSETS-TRACKING-PB03.yaml
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - runtime/**
    - frontend/apps/web/dist/**
    - frontend/apps/web/.vite/**
    - addons/**/security/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - record_rules/**

limits:
  max_output_lines: 160
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - do not move or reinterpret migration assets
  - do not unignore the whole `artifacts/` tree
  - preserve migration asset file bytes without line-ending normalization
  - do not commit runtime databases, Redis dumps, frontend builds, or local config
  - keep the change limited to tracking the existing migration rebuild asset line

context:
  branch: feature/legacy-data-rebuild-assets-pb03
  baseline_sha: 099bcea
  explicit_user_authorization: true
  asset_path: artifacts/migration
  implementation_note: >
    Existing local assets include three files above GitHub's ordinary 100MB
    object limit. A Git LFS push was attempted and rejected because the
    repository exceeded its LFS budget, so those three files are tracked as
    byte-preserving parts with a materialization script that restores the
    original paths and verifies SHA-256. All other artifacts/migration files
    are tracked as ordinary byte-preserving Git objects.

architecture:
  layer_target: Governance Layer
  module: migration rebuild assets
  module_owner: delivery reproducibility surface
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch does not change business facts. It preserves already produced
    migration/rebuild assets as repository-backed handoff material.
  reason: >
    `artifacts/migration/**` contains the prepared legacy business-data rebuild
    evidence, replay payloads, manifests, snapshots, and rollback lists, but the
    parent `artifacts/` ignore rule prevents these assets from entering main.

acceptance:
  commands:
    - git check-ignore -v artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json
    - test -s artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json
    - test -s artifacts/migration/fresh_db_replay_manifest_v1.json
    - git diff --check -- .gitignore artifacts/migration/README.md docs/ops/iterations/delivery_context_switch_log_v1.md

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - non_migration_artifacts_unignored
  - runtime_or_frontend_build_assets_selected
  - migration_asset_path_missing

deliverables:
  - "`.gitattributes` byte-preservation rule for `artifacts/migration/**`"
  - "`.gitignore` exception for `artifacts/migration/**`"
  - tracked migration asset directory documentation
  - migration asset files staged for PR
  - iteration log entry

validation_result:
  status: pass
  passed:
    - artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json exists as recovered frozen inventory
    - artifacts/migration/fresh_db_replay_manifest_v1.json exists
    - artifacts/migration is no longer excluded by the parent artifacts ignore rule
    - non-migration artifacts remain ignored
    - three files above 100MB are staged as tracked parts with SHA-256 materialization
    - staged ordinary Git objects are under 100MB
    - no forbidden paths are staged
    - scoped git diff --check for rules, README, task file, and iteration log
  notes:
    - legacy_db_full_rebuild_blueprint_v1.json was recovered from the frozen ITER-2026-04-13-1850 inventory because the legacy-sqlserver container is not available in the PB03 packaging workspace

rollback:
  - git restore .gitignore artifacts/migration/README.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-23-GOV-MIGRATION-ASSETS-TRACKING-PB03.yaml
