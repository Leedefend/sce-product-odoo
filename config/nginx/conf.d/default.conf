map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

map $http_x_odoo_db $sc_proxy_db_from_header {
  default $http_x_odoo_db;
  ''      sc_demo;
}

map $arg_db $sc_proxy_db {
  default $arg_db;
  ''      $sc_proxy_db_from_header;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 512m;

  proxy_read_timeout 1800s;
  proxy_send_timeout 1800s;
  proxy_connect_timeout 60s;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files /index.html =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location = /web {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location ^~ /web/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location ^~ /web_editor/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location ^~ /mail/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location ^~ /report/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location ^~ /longpolling/ {
    proxy_pass http://odoo:8069;
    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;
  }

  location /websocket {
    proxy_pass http://odoo:8069/websocket;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Odoo-DB         $sc_proxy_db;
    proxy_set_header X-DB              $sc_proxy_db;
    proxy_set_header X-Odoo-DB-Locked  $sc_proxy_db;

    proxy_read_timeout 1800s;
  }
}
