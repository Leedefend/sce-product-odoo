services:
  db:
    environment:
      POSTGRES_DB: sc_release_rehearsal
    ports: []

  redis:
    ports: []

  odoo:
    environment:
      SC_ENVIRONMENT: release_rehearsal
      SC_ALLOW_DEMO_DATA: "0"
      ODOO_DB: sc_release_rehearsal
      ODOO_DBFILTER: ^sc_release_rehearsal$$
    ports:
      - "18087:8069"
    volumes:
      - ./config/release/odoo.release-rehearsal.conf.template:/etc/odoo/odoo.conf.template:ro

  nginx:
    ports:
      - "18086:80"
    volumes:
      - ./config/nginx/conf.d/release-rehearsal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/apps/web/dist-release-rehearsal:/usr/share/nginx/html:ro
